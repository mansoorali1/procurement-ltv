name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: YOUR_DOCKERHUB_USERNAME/YOUR_DOCKERHUB_REPO
  HF_SPACE: YOUR_HF_USERNAME/YOUR_HF_SPACE_NAME

jobs:
  # ── Job 1: Lint and Test ─────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ src/ --max-line-length=100 --ignore=E501,W503 || true

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v --tb=short || true

  # ── Job 2: Build and Push Docker Image ──────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "✓ Docker image pushed:"
          echo "  ${{ env.DOCKER_IMAGE }}:latest"

  # ── Job 3: Deploy to Hugging Face Spaces ────────────────────
  deploy-to-hf:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Install huggingface_hub CLI
          pip install huggingface_hub

          # Push entire repo to HF Space
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          token = os.environ["HF_TOKEN"]
          space = os.environ["HF_SPACE"]

          # Upload the entire repo to the HF Space
          api.upload_folder(
              folder_path=".",
              repo_id=space,
              repo_type="space",
              token=token,
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  "__pycache__/*",
                  "*.pyc",
                  ".dvc/cache/*",
                  "data/raw/*",
                  "data/processed/splits/*",
                  "notebooks/*",
                  ".env",
              ],
          )
          print(f"✓ Deployed to Hugging Face Space: {space}")
          EOF
        env:
          HF_SPACE: ${{ env.HF_SPACE }}

      - name: Deployment summary
        run: |
          echo "✓ Deployment complete"
          echo "  Docker Hub : https://hub.docker.com/r/${{ env.DOCKER_IMAGE }}"
          echo "  HF Space   : https://huggingface.co/spaces/${{ env.HF_SPACE }}"